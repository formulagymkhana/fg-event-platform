<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self';
             script-src 'self';
             connect-src https://script.google.com
                         https://script.googleusercontent.com;
             style-src 'self' 'unsafe-inline';">
  <title>FORMULA GYMKHANA — スタンプ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; background: #F0F3F7; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #fff; border-radius: 16px; width: 100%; max-width: 360px; overflow: hidden; box-shadow: 0 4px 24px rgba(11,37,69,0.10); }
    .fg-header { background: #0B2545; padding: 13px 20px; display: flex; align-items: center; }
    .fg-logo { font-size: 11px; font-weight: 700; letter-spacing: 0.15em; color: #fff; }
    .fg-logo span { background: #fff; color: #0B2545; padding: 1px 6px; border-radius: 2px; margin-left: 2px; }
    .card-body { padding: 32px 24px 28px; text-align: center; }
    #state-loading .spinner { width: 36px; height: 36px; border: 3px solid #D4DBE6; border-top-color: #0B2545; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .stamp-icon { width: 80px; height: 80px; border-radius: 50%; background: #0B2545; color: #fff; font-size: 36px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; animation: stampIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    @keyframes stampIn { 0% { transform: scale(2.5) rotate(-15deg); opacity: 0; } 60% { transform: scale(0.9) rotate(5deg); opacity: 1; } 80% { transform: scale(1.05) rotate(-2deg); } 100% { transform: scale(1) rotate(0deg); } }
    .stamp-company { font-size: 13px; color: #6B7A8D; margin-bottom: 6px; }
    .stamp-title { font-size: 20px; font-weight: 700; color: #0B2545; margin-bottom: 22px; }
    /* 進捗バー */
    .bar-track { width: 100%; height: 14px; background: #E8ECF0; border-radius: 100px; overflow: hidden; }
    .bar-fill { height: 100%; background: linear-gradient(90deg, #0B2545, #1A4A80); border-radius: 100px; width: 0; transition: width 0.6s ease 0.2s; }
    .stamp-count { font-size: 13px; color: #6B7A8D; margin: 10px 0 20px; }
    .cleared-banner { background: linear-gradient(135deg, #0B2545, #1A4A80); color: #fff; border-radius: 8px; padding: 14px; font-size: 14px; font-weight: 600; }
    .cleared-banner .cleared-sub { font-size: 12px; font-weight: 400; opacity: 0.85; margin-top: 4px; }
    .state-title { font-size: 16px; font-weight: 600; color: #1A2733; margin-bottom: 8px; }
    .state-msg   { font-size: 13px; color: #6B7A8D; line-height: 1.7; }
    .state-icon  { font-size: 48px; margin-bottom: 16px; }
    .action-link { display: block; margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 13px; text-decoration: none; text-align: center; }
    .action-link.primary { background: #0B2545; color: #fff; }
    .action-link.secondary { background: #F0F3F7; color: #0B2545; }
  </style>
</head>
<body>

  <!-- ローディング -->
  <div class="card" id="state-loading">
    <div class="fg-header"><div class="fg-logo">FORMULA <span>GYMKHANA</span></div></div>
    <div class="card-body">
      <div class="spinner"></div>
      <p style="font-size:13px;color:#6B7A8D;">スタンプを記録中...</p>
    </div>
  </div>

  <!-- スタンプラリー未開始 -->
  <div class="card" id="state-no-token" style="display:none">
    <div class="fg-header"><div class="fg-logo">FORMULA <span>GYMKHANA</span></div></div>
    <div class="card-body">
      <div class="state-icon">🎫</div>
      <p class="state-title">スタンプラリーをまだ開始していません</p>
      <p class="state-msg">スタンプを受け取るには、まずスタンプラリー開始ページでQRコードを読み取ってください。</p>
      <a href="start.html" class="action-link primary">スタンプラリーを開始する →</a>
    </div>
  </div>

  <!-- スタンプ成功 -->
  <div class="card" id="state-success" style="display:none">
    <div class="fg-header"><div class="fg-logo">FORMULA <span>GYMKHANA</span></div></div>
    <div class="card-body">
      <div class="stamp-icon">✓</div>
      <p class="stamp-company" id="success-company"></p>
      <p class="stamp-title">スタンプ獲得！</p>
      <div class="bar-track"><div class="bar-fill" id="bar-fill"></div></div>
      <p class="stamp-count" id="stamp-count"></p>
      <div class="cleared-banner" id="cleared-banner" style="display:none"></div>
      <a href="progress.html" class="action-link secondary">スタンプ進捗を確認する →</a>
    </div>
  </div>

  <!-- 取得済み -->
  <div class="card" id="state-already" style="display:none">
    <div class="fg-header"><div class="fg-logo">FORMULA <span>GYMKHANA</span></div></div>
    <div class="card-body">
      <div class="state-icon">🔖</div>
      <p class="state-title">このブースのスタンプは取得済みです</p>
      <p class="state-msg">別のブースでスタンプを集めましょう</p>
      <a href="progress.html" class="action-link secondary">スタンプ進捗を確認する →</a>
    </div>
  </div>

  <!-- エラー -->
  <div class="card" id="state-error" style="display:none">
    <div class="fg-header"><div class="fg-logo">FORMULA <span>GYMKHANA</span></div></div>
    <div class="card-body">
      <div class="state-icon">⚠</div>
      <p class="state-title" id="error-title">エラー</p>
      <p class="state-msg" id="error-msg"></p>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/stamp.js"></script>
</body>
</html>
