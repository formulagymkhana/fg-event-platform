<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self';
             script-src 'self';
             connect-src https://script.google.com
                         https://script.googleusercontent.com;
             style-src 'self' 'unsafe-inline';">
  <title>FORMULA GYMKHANA — スタンプ</title>
  <link rel="stylesheet" href="../js/style.css">
  <style>
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }

    .card { width: 100%; max-width: 360px; }

    /* スタンプ成功アイコン */
    .stamp-icon {
      width: 80px; height: 80px; border-radius: 20px;
      background: var(--fg-blue-soft); color: var(--fg-blue);
      font-size: 36px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      animation: stampIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    @keyframes stampIn {
      0%   { transform: scale(2.5) rotate(-15deg); opacity: 0; }
      60%  { transform: scale(0.9)  rotate(5deg);  opacity: 1; }
      80%  { transform: scale(1.05) rotate(-2deg); }
      100% { transform: scale(1)    rotate(0deg);  }
    }

    .stamp-company { font-size: 13px; color: var(--fg-muted); margin-bottom: 6px; }
    .stamp-title   { font-size: 20px; font-weight: 700; color: var(--fg-navy); margin-bottom: 22px; }

    /* 進捗バー */
    .bar-track { width: 100%; height: 10px; background: var(--fg-line); border-radius: 100px; overflow: hidden; }
    .bar-fill  { height: 100%; background: linear-gradient(90deg, var(--fg-blue), #4A9BE8); border-radius: 100px; width: 0; transition: width 0.6s ease 0.2s; }
    .stamp-count { font-size: 13px; color: var(--fg-muted); margin: 10px 0 20px; }

    /* 達成バナーは style.css の .status-card.cleared を使用 */
  </style>
</head>
<body>

  <!-- ローディング -->
  <div class="card" id="state-loading">
    <div class="fg-header">
      <div class="fg-logo">FORMULA <span>GYMKHANA</span></div>
    </div>
    <div class="card-body">
      <div class="spinner"></div>
      <p style="font-size:13px;color:var(--fg-muted);">確認中...</p>
    </div>
  </div>

  <!-- スタンプラリー未開始 -->
  <div class="card" id="state-no-token" style="display:none">
    <div class="fg-header">
      <div class="fg-logo">FORMULA <span>GYMKHANA</span></div>
    </div>
    <div class="card-body">
      <div class="state-icon">🎫</div>
      <p class="state-title">スタンプラリーをまだ開始していません</p>
      <p class="state-msg">スタンプを受け取るには、まずスタンプラリー開始ページでQRコードを読み取ってください。</p>
      <a href="start.html" class="action-link primary">スタンプラリーを開始する →</a>
    </div>
  </div>

  <!-- スタンプ成功 -->
  <div class="card" id="state-success" style="display:none">
    <div class="fg-header">
      <div class="fg-logo">FORMULA <span>GYMKHANA</span></div>
    </div>
    <div class="card-body">
      <div class="stamp-icon">✓</div>
      <p class="stamp-company" id="success-company"></p>
      <p class="stamp-title">スタンプ獲得！</p>
      <div class="bar-track"><div class="bar-fill" id="bar-fill"></div></div>
      <p class="stamp-count" id="stamp-count"></p>
      <div class="status-card cleared" id="cleared-banner" style="display:none"></div>
      <a href="progress.html" class="action-link secondary">スタンプ進捗を確認する →</a>
    </div>
  </div>

  <!-- 取得済み -->
  <div class="card" id="state-already" style="display:none">
    <div class="fg-header">
      <div class="fg-logo">FORMULA <span>GYMKHANA</span></div>
    </div>
    <div class="card-body">
      <div class="state-icon">🔖</div>
      <p class="state-title">このブースのスタンプは取得済みです</p>
      <p class="state-msg">別のブースでスタンプを集めましょう</p>
      <a href="progress.html" class="action-link secondary">スタンプ進捗を確認する →</a>
    </div>
  </div>

  <!-- エラー -->
  <div class="card" id="state-error" style="display:none">
    <div class="fg-header">
      <div class="fg-logo">FORMULA <span>GYMKHANA</span></div>
    </div>
    <div class="card-body">
      <div class="state-icon">⚠</div>
      <p class="state-title" id="error-title">エラー</p>
      <p class="state-msg" id="error-msg"></p>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/stamp.js"></script>
</body>
</html>
