<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self';
             script-src 'self';
             connect-src https://script.google.com
                         https://script.googleusercontent.com;
             img-src 'self' https: data:;
             style-src 'self' 'unsafe-inline';">
  <title>FORMULA GYMKHANA — 来訪学生一覧</title>
  <link rel="stylesheet" href="../js/style.css?v=20260623a">
  <style>
    body { display: flex; flex-direction: column; align-items: center; min-height: 100vh;
           padding: 0 0 48px; background: var(--fg-bg); }

    .page-wrap { width: 100%; max-width: 480px; }

    /* ヘッダー（白背景＋青下線の共通意匠に統一） */
    .co-header { background: #fff; padding: 18px 20px 14px; border-bottom: 3px solid var(--fg-blue); }
    .co-name { margin-top: 12px; font-size: 19px; font-weight: 700; color: var(--fg-navy); line-height: 1.3; }
    .co-subtitle { margin-top: 4px; font-size: 12px; color: var(--fg-muted); }

    /* タブ */
    .tab-bar { display: flex; background: #fff; border-bottom: 2px solid var(--fg-line); }
    .tab-btn { flex: 1; padding: 12px 8px; font-size: 13px; font-weight: 600; color: var(--fg-muted);
               background: none; border: none; border-bottom: 3px solid transparent;
               margin-bottom: -2px; cursor: pointer; transition: color 0.15s, border-color 0.15s; }
    .tab-btn.active { color: var(--fg-blue); border-bottom-color: var(--fg-blue); }
    .tab-count { font-size: 11px; font-weight: 400; margin-left: 4px; }

    /* コンテンツ */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* 学生行 */
    .visitor-list { margin: 12px 12px 0; border: 1px solid var(--fg-line); border-radius: 10px; overflow: hidden; background: #fff; }
    .visitor-row { padding: 11px 14px; border-bottom: 1px solid var(--fg-line); }
    .visitor-row:last-child { border-bottom: none; }
    .visitor-row:active { background: var(--fg-blue-soft); }
    .v-head { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
    .v-name { font-size: 14px; font-weight: 600; color: var(--fg-navy); }
    .v-furigana { font-size: 10px; color: var(--fg-muted); margin-left: 4px; font-weight: 400; }
    .v-time { font-size: 11px; color: var(--fg-muted); flex-shrink: 0; }
    .v-meta { margin-top: 3px; font-size: 11px; color: var(--fg-muted); }
    .v-cat { display: inline-block; margin-left: 6px; font-size: 10px; font-weight: 600;
             background: var(--fg-bg); color: var(--fg-gray); border-radius: 4px; padding: 1px 6px; }
    .v-email { margin-top: 4px; font-size: 11px; color: var(--fg-blue); word-break: break-all;
               cursor: pointer; text-decoration: underline; text-decoration-color: var(--fg-blue-border); }
    .v-link { color: var(--fg-navy); text-decoration: none; }
    .v-link:active { color: var(--fg-blue); }

    /* 空・エラー */
    .empty-note { text-align: center; padding: 32px 20px; font-size: 13px; color: var(--fg-muted); line-height: 1.7; }
    .err-note { margin: 12px; padding: 14px 16px; border-radius: 10px;
                background: var(--fg-error-bg); color: var(--fg-error); font-size: 13px; line-height: 1.6; }

    /* ローディング/エラー全画面 */
    #state-loading { display: flex; flex-direction: column; align-items: center;
                     justify-content: center; min-height: 100vh; gap: 16px; width: 100%; }
    #state-error { display: none; flex-direction: column; align-items: center;
                   justify-content: center; min-height: 100vh; padding: 40px 24px; text-align: center; }
    .err-icon { font-size: 36px; margin-bottom: 12px; }
    .err-title { font-size: 17px; font-weight: 700; color: var(--fg-text); margin-bottom: 8px; }
    .err-msg { font-size: 13px; color: var(--fg-muted); line-height: 1.7; }

    /* コピートースト */
    #toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px);
             background: #222; color: #fff; padding: 9px 20px; border-radius: 100px;
             font-size: 13px; opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* 更新ボタン */
    .reload-bar { padding: 12px 12px 0; }
    .reload-btn { width: 100%; padding: 10px; background: #fff; border: 1px solid var(--fg-line);
                  border-radius: 8px; font-size: 12px; color: var(--fg-muted); cursor: pointer; }
    .reload-btn:active { background: var(--fg-bg); }

    /* 企業QR登録完了バナー */
    .reg-banner { display: flex; align-items: flex-start; gap: 10px;
                  padding: 12px 20px; background: var(--fg-blue-soft);
                  border-bottom: 1px solid var(--fg-blue-border); }
    .reg-banner-check { width: 20px; height: 20px; border-radius: 50%;
                        background: var(--fg-blue); color: #fff;
                        font-size: 12px; font-weight: 700; flex-shrink: 0;
                        display: flex; align-items: center; justify-content: center;
                        margin-top: 1px; }
    .reg-banner-title { font-size: 13px; font-weight: 700; color: var(--fg-navy); margin-bottom: 2px; }
    .reg-banner-msg { font-size: 12px; color: var(--fg-muted); line-height: 1.6; }
  </style>
</head>
<body>

  <!-- ローディング -->
  <div id="state-loading">
    <div class="spinner"></div>
    <p style="font-size:13px;color:var(--fg-muted);">読み込み中...</p>
  </div>

  <!-- エラー -->
  <div id="state-error">
    <div class="err-icon">⚠</div>
    <p class="err-title" id="err-title">エラーが発生しました</p>
    <p class="err-msg" id="err-msg"></p>
  </div>

  <!-- メイン -->
  <div id="state-main" style="display:none" class="page-wrap">
    <div class="co-header">
      <div class="fg-logo">
        <div class="fg-logo-mark">FORMULA <span>GYMKHANA</span></div>
        <div class="fg-logo-sub">College Students RD</div>
      </div>
      <div class="co-name" id="co-name">—</div>
      <div class="co-subtitle">来訪学生一覧</div>
    </div>

    <!-- 企業QR初回スキャン時の登録完了バナー -->
    <div id="reg-banner" style="display:none" class="reg-banner">
      <div class="reg-banner-check">✓</div>
      <div>
        <div class="reg-banner-title">端末登録が完了しました</div>
        <div class="reg-banner-msg">学生QR名刺を読み取ると、この端末での来訪が自動で記録されます。</div>
      </div>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" id="tab-qr" data-tab="qr">
        QRスキャン<span class="tab-count" id="qr-count"></span>
      </button>
      <button class="tab-btn" id="tab-stamp" data-tab="stamp">
        スタンプ<span class="tab-count" id="stamp-count"></span>
      </button>
    </div>

    <!-- QR スキャンログ -->
    <div class="tab-content active" id="content-qr">
      <div class="reload-bar">
        <button class="reload-btn" id="btn-reload-qr">↻ 更新</button>
      </div>
      <div id="qr-list-wrap"></div>
    </div>

    <!-- スタンプ来訪者 -->
    <div class="tab-content" id="content-stamp">
      <div class="reload-bar">
        <button class="reload-btn" id="btn-reload-stamp">↻ 更新</button>
      </div>
      <div id="stamp-list-wrap"></div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="../js/config.js?v=20260623a"></script>
  <script src="../js/api.js?v=20260623a"></script>
  <script src="../js/company.js?v=20260623b"></script>
</body>
</html>
